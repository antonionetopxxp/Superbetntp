<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Bet - Apostas Esportivas</title>
    <style>
        /* Reset e base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0a0a1a; color: #f0f0f0; line-height: 1.6; }

        /* Layout principal */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #222; }
        h1 { color: #ffcc00; font-size: 2.5rem; }
        nav { display: flex; gap: 20px; }
        nav a { color: #fff; text-decoration: none; font-weight: bold; transition: color 0.3s; }
        nav a:hover { color: #ffcc00; }

        /* Cards de jogos */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin: 40px 0; }
        .game-card { background: #1a1a2e; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.3s; }
        .game-card:hover { transform: translateY(-5px); }
        .game-header { background: linear-gradient(45deg, #ffcc00, #ff9900); padding: 15px; text-align: center; }
        .game-details { padding: 20px; }
        .teams { display: flex; justify-content: space-around; align-items: center; margin-bottom: 15px; }
        .team { text-align: center; }
        .vs { font-size: 1.5rem; font-weight: bold; }
        .odds { display: flex; justify-content: space-around; margin-top: 20px; }
        .odd-btn { background: #2a2a4a; color: #fff; border: none; padding: 10px; width: 80px; cursor: pointer; border-radius: 5px; transition: background 0.3s; }
        .odd-btn:hover { background: #ffcc00; }

        /* Aposta */
        .bet-section { margin: 40px 0; padding: 20px; background: #1a1a2e; border-radius: 10px; }
        .bet-title { color: #ffcc00; margin-bottom: 20px; }
        .bet-form { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-control { width: 100%; padding: 10px; background: #2a2a4a; border: 1px solid #444; border-radius: 5px; color: #fff; }
        .btn-submit { background: #ffcc00; color: #000; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        .btn-submit:hover { background: #ffdd33; }

        /* Histórico */
        .history-section { margin: 40px 0; }
        .history-item { padding: 15px; background: #1a1a2e; margin-bottom: 10px; border-radius: 5px; }
        .history-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .history-result { color: #ffcc00; font-weight: bold; }

        /* Footer */
        footer { text-align: center; padding: 20px; margin-top: 40px; border-top: 1px solid #222; }
        
        /* Responsividade */
        @media (max-width: 768px) {
            .bet-form { grid-template-columns: 1fr; }
            .games-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Super Bet</h1>
            <nav>
                <a href="#home">Início</a>
                <a href="#games">Jogos</a>
                <a href="#history">Histórico</a>
                <a href="#account">Conta</a>
            </nav>
        </header>

        <section id="home">
            <h2>Bem-vindo ao Super Bet!</h2>
            <p>Faça suas apostas em jogos esportivos com os melhores odds do mercado.</p>
        </section>

        <section id="games">
            <h2>Jogos Disponíveis</h2>
            <div class="games-grid" id="games-container">
                <!-- Cards de jogos serão gerados aqui -->
            </div>
        </section>

        <section id="bet" class="bet-section">
            <h3 class="bet-title">Fazer Aposta</h3>
            <div class="bet-form">
                <div class="form-group">
                    <label for="player-name">Nome do Jogador:</label>
                    <input type="text" id="player-name" class="form-control" placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label for="game-select">Selecione o Jogo:</label>
                    <select id="game-select" class="form-control">
                        <option value="">-- Selecione --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bet-type">Tipo de Aposta:</label>
                    <select id="bet-type" class="form-control">
                        <option value="1">Vitória Time 1</option>
                        <option value="X">Empate</option>
                        <option value="2">Vitória Time 2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bet-amount">Valor da Aposta (R$):</label>
                    <input type="number" id="bet-amount" class="form-control" placeholder="0.00" step="0.01">
                </div>
            </div>
            <button class="btn-submit" onclick="submitBet()">Fazer Aposta</button>
        </section>

        <section id="history" class="history-section">
            <h2>Histórico de Apostas</h2>
            <div id="history-container">
                <!-- Histórico será carregado aqui -->
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2023 Super Bet - Todos os direitos reservados</p>
    </footer>

    <script>
        // Dados simulados de jogos
        const games = [
            { id: 1, time1: "Time A", time2: "Time B", odds: { "1": 2.2, "X": 3.1, "2": 3.0 } },
            { id: 2, time1: "Time C", time2: "Time D", odds: { "1": 1.8, "X": 3.4, "2": 4.2 } },
            { id: 3, time1: "Time E", time2: "Time F", odds: { "1": 2.5, "X": 3.3, "2": 2.8 } }
        ];

        // Estado da aplicação
        let bets = [];
        let results = {};

        // Inicializar a página
        function init() {
            renderGames();
            loadHistory();
        }

        // Renderizar os cards de jogos
        function renderGames() {
            const container = document.getElementById('games-container');
            container.innerHTML = '';
            
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                
                const teams = document.createElement('div');
                teams.className = 'teams';
                
                const team1 = document.createElement('div');
                team1.className = 'team';
                team1.innerHTML = `<strong>${game.time1}</strong>`;
                
                const vs = document.createElement('div');
                vs.className = 'vs';
                vs.textContent = 'VS';
                
                const team2 = document.createElement('div');
                team2.className = 'team';
                team2.innerHTML = `<strong>${game.time2}</strong>`;
                
                teams.appendChild(team1);
                teams.appendChild(vs);
                teams.appendChild(team2);
                
                const oddsContainer = document.createElement('div');
                oddsContainer.className = 'odds';
                
                Object.entries(game.odds).forEach(([type, odd]) => {
                    const btn = document.createElement('button');
                    btn.className = 'odd-btn';
                    btn.textContent = odd;
                    btn.onclick = () => selectOdd(game.id, type);
                    oddsContainer.appendChild(btn);
                });
                
                card.appendChild(teams);
                card.appendChild(oddsContainer);
                
                container.appendChild(card);
                
                // Preencher select de jogos
                const select = document.getElementById('game-select');
                const option = document.createElement('option');
                option.value = game.id;
                option.textContent = `${game.time1} vs ${game.time2}`;
                select.appendChild(option);
            });
        }

        // Selecionar odd para aposta
        function selectOdd(gameId, oddType) {
            document.getElementById('game-select').value = gameId;
            document.getElementById('bet-type').value = oddType;
        }

        // Enviar aposta
        function submitBet() {
            const playerName = document.getElementById('player-name').value;
            const gameId = parseInt(document.getElementById('game-select').value);
            const betType = document.getElementById('bet-type').value;
            const amount = parseFloat(document.getElementById('bet-amount').value);
            
            if (!playerName || !gameId || !amount || amount <= 0) {
                alert('Preencha todos os campos corretamente!');
                return;
            }
            
            const bet = {
                id: Date.now(),
                player: playerName,
                game: games.find(g => g.id === gameId),
                type: betType,
                amount: amount,
                timestamp: new Date().toISOString()
            };
            
            bets.push(bet);
            saveBets();
            loadHistory();
            alert(`Aposta feita com sucesso!\nJogo: ${bet.game.time1} vs ${bet.game.time2}\nTipo: ${bet.type}\nValor: R$${amount.toFixed(2)}`);
            
            // Limpar formulário
            document.getElementById('player-name').value = '';
            document.getElementById('bet-amount').value = '';
        }

        // Carregar histórico
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('superbet_bets') || '[]');
            const container = document.getElementById('history-container');
            
            container.innerHTML = '';
            
            if (history.length === 0) {
                container.innerHTML = '<p>Nenhuma aposta registrada ainda.</p>';
                return;
            }
            
            history.reverse().forEach(bet => {
                const item = document.createElement('div');
                item.className = 'history-item';
                
                const header = document.createElement('div');
                header.className = 'history-header';
                
                const title = document.createElement('h4');
                title.textContent = `${bet.player} (${new Date(bet.timestamp).toLocaleDateString()})`;
                
                const result = document.createElement('div');
                result.className = 'history-result';
                result.textContent = `Resultado: ${bet.result || 'Pendente'}`;
                
                header.appendChild(title);
                header.appendChild(result);
                
                const details = document.createElement('div');
                details.innerHTML = `
                    <p><strong>Jogo:</strong> ${bet.game.time1} vs ${bet.game.time2}</p>
                    <p><strong>Tipo:</strong> ${bet.type}</p>
                    <p><strong>Valor:</strong> R$${bet.amount.toFixed(2)}</p>
                    ${bet.result ? `<p><strong>Premiação:</strong> R$${(bet.amount * getOddsForType(bet.game, bet.type)).toFixed(2)}</p>` : ''}
                `;
                
                item.appendChild(header);
                item.appendChild(details);
                container.appendChild(item);
            });
        }

        // Salvar apostas no localStorage
        function saveBets() {
            localStorage.setItem('superbet_bets', JSON.stringify(bets));
        }

        // Obter odds para um tipo específico
        function getOddsForType(game, type) {
            return game.odds[type];
        }

        // Simular resultados (função para testes)
        function simulateResults() {
            results = {};
            games.forEach(game => {
                const result = ['1', 'X', '2'][Math.floor(Math.random() * 3)];
                results[game.id] = result;
            });
            
            // Atualizar histórico com resultados
            bets.forEach(bet => {
                if (!bet.result) {
                    bet.result = results[bet.game.id] === bet.type ? 'Ganhou' : 'Perdeu';
                }
            });
            
            saveBets();
            loadHistory();
            alert('Resultados simulados!');
        }

        // Inicializar quando a página carregar
        window.onload = init;
    </script>
</body>
</html>
